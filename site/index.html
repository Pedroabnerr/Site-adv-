<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rocha Advocacia — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-0:#07192b;
    --bg-1:#0c2336;
    --bg-2:#123048;
    --ink:#f4f1ea;
    --ink-soft:#c7c2b4;
    --ink-dim:#8b94a0;
    --line:rgba(226,217,195,0.14);
    --card:rgba(12,35,54,0.72);
    --accent:#e2d9c3;
    --accent-deep:#cabf9f;
    --accent-2:#554237;
    --on-accent:#07192b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg-0);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #root{ min-height:100vh; }

  .hero-root{
    position:relative;
    min-height:100vh;
    padding:26px clamp(20px,3.5vw,56px) 0;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(1200px 600px at 50% -8%, rgba(226,217,195,0.12), transparent 60%),
      radial-gradient(900px 700px at 50% 30%, var(--bg-2), transparent 70%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0));
    isolation:isolate;
  }
  .hero-root::after{
    /* subtle grain/vignette */
    content:"";
    position:absolute; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(120% 100% at 50% 100%, transparent 55%, rgba(0,0,0,0.45));
  }

  /* ---------- NAV ---------- */
  .nav{ position:relative; z-index:6; display:flex; justify-content:center; align-items:center; }
  .nav-bar{
    display:flex; align-items:center; gap:18px;
    max-width:760px; margin:0 auto;
    padding:11px 11px 11px 22px;
    background:rgba(9,30,48,0.55);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    backdrop-filter:blur(14px);
    box-shadow:0 18px 50px -26px rgba(0,0,0,0.85);
  }
  .brand{ display:flex; align-items:center; gap:11px; position:absolute; left:clamp(10px,2.4vw,40px); top:50%; transform:translateY(-50%); }
  .brand-logo{ height:46px; width:auto; display:block; }
  .nav-burger{
    display:none; flex-direction:column; justify-content:center; gap:4px;
    width:38px; height:38px; border-radius:11px; cursor:pointer; padding:0;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  }
  .nav-burger span{ display:block; width:16px; height:2px; border-radius:2px; background:var(--ink); margin:0 auto; transition:transform .25s ease, opacity .2s ease; }
  .nav-burger.is-open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
  .nav-burger.is-open span:nth-child(2){ opacity:0; }
  .nav-burger.is-open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }
  .mobile-menu{ display:none; }
  .brand-mark{ width:14px; height:14px; border-radius:3px; transform:rotate(45deg); }
  .brand-name{ font-family:'Montserrat'; font-weight:800; font-size:21px; letter-spacing:-0.01em; display:flex; align-items:baseline; gap:6px; }
  .brand-sub{ font-weight:500; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-dim); }

  .nav-links{
    flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .nav-link{
    color:var(--ink-soft); text-decoration:none; font-size:14px; font-weight:500;
    padding:8px 14px; border-radius:999px; transition:.2s; white-space:nowrap;
  }
  .nav-link:hover{ color:var(--ink); background:rgba(255,255,255,0.06); }

  .btn{
    display:inline-flex; align-items:center; gap:10px;
    font-family:'Montserrat'; font-weight:600; font-size:14px;
    border:none; cursor:pointer; border-radius:999px; transition:.2s;
  }
  .btn-ic{ display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,0.18); }
  .btn-ghost-gold{
    color:var(--ink); padding:9px 9px 9px 20px;
    background:rgba(226,217,195,0.10); border:1px solid rgba(226,217,195,0.40);
  }
  .btn-ghost-gold .btn-ic{ background:var(--accent); color:var(--on-accent); }
  .btn-ghost-gold:hover{ background:rgba(226,217,195,0.20); }
  .btn-solid-gold{
    color:var(--ink); padding:13px 14px 13px 24px; font-size:15px; font-weight:700;
    box-shadow:0 12px 30px -14px rgba(7,25,43,0.7);
  }
  .btn-solid-gold .btn-ic.dark{ background:rgba(0,0,0,0.22); color:var(--ink); }
  .btn-solid-gold:hover{ transform:translateY(-2px); }
  .btn-light{
    background:var(--accent); color:var(--on-accent); padding:8px 8px 8px 26px;
    font-size:15px; font-weight:700; box-shadow:0 16px 38px -18px rgba(0,0,0,0.85);
  }
  .btn-light .btn-ic{ width:38px; height:38px; color:var(--accent); background:var(--on-accent); }
  .btn-light:hover{ transform:translateY(-2px); }

  /* ---------- STAGE ---------- */
  .stage{
    position:relative; z-index:6; flex:1;
    display:grid; grid-template-columns:1.08fr 0.92fr;
    align-items:end; min-height:0;
    padding:clamp(16px,3.5vh,48px) 0 0;
  }
  .col-left{
    grid-column:1; align-self:center; z-index:7;
    max-width:600px; padding-bottom:30px;
    margin-left:clamp(10px,2.4vw,40px);
  }
  .col-photo{
    grid-column:2; align-self:end;
    position:relative; display:flex; justify-content:flex-start; align-items:flex-end;
    height:100%;
    margin-left:calc(-1 * clamp(20px,5vw,90px));
  }
  .col-photo::before{
    content:""; position:absolute; z-index:-1;
    right:0; bottom:0; width:min(46vw,600px); height:min(74vh,640px);
    background:radial-gradient(55% 55% at 62% 42%, rgba(226,217,195,0.12), transparent 70%);
  }
  .photo-figure{
    position:absolute; bottom:0; left:0;
    height:min(90vh,880px); width:auto;
    max-width:min(66vw,880px);
    object-fit:contain; object-position:bottom center;
    display:block;
    filter:drop-shadow(0 38px 60px rgba(0,0,0,0.55));
  }

  .badge{
    display:inline-flex; align-items:center; gap:9px;
    padding:8px 16px; border-radius:999px; margin-bottom:26px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
    font-size:12.5px; font-weight:600; letter-spacing:0.04em; color:var(--ink-soft);
    text-transform:uppercase;
  }
  .badge-dot{ width:7px; height:7px; border-radius:50%; }
  .headline{
    font-size:clamp(40px,4.9vw,72px);
    line-height:1.02; letter-spacing:-0.02em; font-weight:800;
    text-wrap:balance;
  }
  .headline .accent{ font-style:italic; }
  .lead{
    margin-top:24px; max-width:440px;
    color:var(--ink-soft); font-size:16px; line-height:1.6;
  }
  .col-left .btn-light{ margin-top:34px; }
  .col-left .review-card{ margin-top:30px; max-width:360px; }
  .review-card{
    background:var(--card); border:1px solid rgba(255,255,255,0.08);
    border-radius:18px; padding:18px 20px; backdrop-filter:blur(10px);
    box-shadow:0 24px 60px -28px rgba(0,0,0,0.7);
  }
  .review-top{ display:flex; align-items:center; gap:14px; }
  .logos{ display:flex; }
  .logo-chip{
    width:34px; height:34px; border-radius:50%; display:grid; place-items:center;
    font-family:'Montserrat'; font-weight:800; font-size:17px; color:#fff;
    border:2px solid var(--card);
  }
  .logo-chip.g{ background:#fff; color:#4285F4; }
  .logo-chip.f{ background:#1877F2; margin-left:-10px; }
  .rating-block{ line-height:1.2; }
  .stars{ font-size:14px; letter-spacing:2px; }
  .rating-meta{ font-size:12.5px; color:var(--ink-soft); margin-top:3px; }
  .rating-meta strong{ color:var(--ink); font-weight:700; }
  .review-text{ margin-top:14px; font-size:14px; line-height:1.55; color:var(--ink-soft); }

  /* ---------- STATS ---------- */
  .stats{
    position:relative; z-index:6;
    display:grid; grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--line);
    padding:26px 0 30px;
  }
  .stat{ position:relative; display:flex; align-items:center; gap:14px; padding:0 8px; }
  .stat-ic{ display:inline-flex; }
  .stat-value{ font-family:'Montserrat'; font-weight:800; font-size:34px; letter-spacing:-0.02em; line-height:1; }
  .stat-label{ font-size:13px; color:var(--ink-soft); margin-top:5px; }
  .stat-div{ position:absolute; right:0; top:50%; transform:translateY(-50%); width:1px; height:42px; background:var(--line); }

  @media (max-width:900px){
    .nav-links{ display:none; }
    .nav{ display:block; }
    .nav-bar{ max-width:none; }
    .brand{ position:static; transform:none; justify-content:center; margin-top:12px; }
    .stage{ grid-template-columns:1fr; gap:8px; padding-top:8px; }
    .col-left{ grid-column:1; grid-row:2; max-width:none; padding-bottom:8px; text-align:center; margin-left:0; }
    .col-left .badge, .col-left .btn-light{ margin-left:auto; margin-right:auto; }
    .col-photo{ grid-column:1; grid-row:1; justify-content:center; align-items:flex-start; margin-left:0; margin-right:0; height:auto; }
    .col-photo::before{ right:50%; transform:translateX(50%); }
    .photo-figure{ position:static; height:auto; width:auto; max-width:min(72vw,360px); max-height:48vh; margin:0 auto; }
    .lead{ margin-left:auto; margin-right:auto; }
    .stats{ grid-template-columns:repeat(2,1fr); gap:22px 0; }
    .stat-div{ display:none; }
  }

  /* ---------- HERO MOBILE (referência: foto no topo, stack centralizado) ---------- */
  @media (max-width:640px){
    .hero-root{ min-height:auto; padding-top:14px; padding-bottom:42px; }
    .brand{ display:flex; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); margin:0; pointer-events:none; z-index:1; }
    .brand-logo{ height:36px; }
    .nav{ z-index:30; }
    .mobile-menu{
      display:flex; flex-direction:column; gap:2px;
      position:absolute; top:calc(100% + 8px); left:0; right:0; z-index:30;
      padding:8px; border-radius:18px;
      background:rgba(9,30,48,0.97); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 24px 60px -28px rgba(0,0,0,0.9);
      opacity:0; transform:translateY(-8px); pointer-events:none;
      transition:opacity .22s ease, transform .22s ease;
    }
    .nav.menu-open .mobile-menu{ opacity:1; transform:none; pointer-events:auto; }
    .mobile-link{
      color:var(--ink-soft); text-decoration:none; font-size:15px; font-weight:500;
      padding:13px 16px; border-radius:12px; transition:.18s;
    }
    .mobile-link:hover, .mobile-link:active{ color:var(--ink); background:rgba(255,255,255,0.06); }
    .nav-bar{ gap:12px; padding:9px 9px 9px 14px; }
    .nav-burger{ display:inline-flex; }
    .nav-bar .btn-ghost-gold{ margin-left:auto; }
    .brand-sub{ display:none; }
    .brand-name{ font-size:18px; }
    .btn-ghost-gold{ padding:9px 9px 9px 16px; font-size:13px; }
    .stage{ padding-top:6px; gap:0; align-content:stretch; }
    .col-photo{ display:none; }
    .col-left{ grid-row:1; padding-top:26px; padding-bottom:0; align-self:stretch; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; text-align:center; }
    .badge{ margin-top:0; margin-bottom:8px; padding:6px 13px; font-size:11.5px; }
    .headline{ font-size:clamp(23px,7.2vw,36px); line-height:1.12; white-space:normal; text-wrap:balance; }
    .headline .accent{ display:block; margin-top:2px; }
    .lead{ font-size:14.5px; line-height:1.55; margin-top:12px; max-width:340px; margin-left:auto; margin-right:auto; }
    .col-left .btn-light{ margin-top:22px; align-self:center; padding:12px 18px 12px 28px; font-size:16px; }
  }

  /* ============ SEÇÃO 2 — REALIDADE ============ */
  .realidade{
    position:relative;
    background:linear-gradient(180deg, var(--bg-0) 0%, #051321 100%);
    border-top:1px solid var(--line);
    padding:clamp(60px,8.5vh,108px) clamp(20px,3.5vw,56px);
  }
  .real-inner{ max-width:1180px; margin:0 auto; }

  /* sliding CAIXA marquee — thin full-bleed strip at the top of section 2 */
  .caixa-marquee{
    margin-top:calc(-1 * clamp(60px,8.5vh,108px));
    margin-left:calc(-1 * clamp(20px,3.5vw,56px));
    margin-right:calc(-1 * clamp(20px,3.5vw,56px));
    margin-bottom:clamp(44px,6vh,72px);
    background:#005CA9;
    overflow:hidden;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .caixa-track{
    display:flex; width:100%;
    justify-content:center; flex-wrap:nowrap; overflow:hidden;
  }
  .caixa-group{ display:flex; }
  .caixa-item{ display:inline-flex; align-items:center; gap:30px; padding:0 15px; }
  .caixa-word{
    font-family:'Montserrat', sans-serif; font-weight:800;
    font-size:14px; letter-spacing:0.16em; line-height:1;
    color:#ffffff; padding:11px 0;
  }
  .caixa-x{ color:#F7941E; }
  .caixa-dot{ width:5px; height:5px; border-radius:50%; background:#F7941E; }
  @keyframes caixa-slide{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }
  .caixa-marquee.bottom{
    margin-top:clamp(44px,6vh,72px);
    margin-bottom:calc(-1 * clamp(60px,8.5vh,108px));
    border-bottom:none;
    border-top:1px solid rgba(255,255,255,0.12);
  }
  @media (prefers-reduced-motion: reduce){ .caixa-track{ animation:none; } }
  .real-head{ max-width:760px; margin:0 auto clamp(48px,6vh,72px); text-align:center; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px; white-space:nowrap;
    font-size:12.5px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--accent); margin-bottom:22px;
  }
  .eyebrow-line{ width:26px; height:2px; border-radius:2px; }
  .real-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(30px,4vw,52px); line-height:1.05; letter-spacing:-0.02em;
    color:var(--ink); text-wrap:balance;
  }
  .real-lead{
    margin:24px auto 0; max-width:820px;
    color:var(--ink-soft); font-size:clamp(15px,1.2vw,17px); line-height:1.7;
    text-wrap:pretty;
  }
  .real-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:18px 30px;
    align-items:stretch; max-width:960px; margin:0 auto;
  }
  .svc-card{
    display:flex; flex-direction:column;
    border-radius:18px; padding:18px 20px 18px;
    min-height:330px;
    transition:transform .28s ease, box-shadow .28s ease;
  }
  .svc-card:hover{ transform:translateY(-6px); }
  .svc-card.light{
    background:#f3efe7; color:#16120c;
    box-shadow:0 18px 44px rgba(0,0,0,0.36);
  }
  .svc-card.dark{
    background:linear-gradient(180deg,#0c2336,#07192b);
    border:1px solid rgba(226,217,195,0.12); color:#fff;
    box-shadow:0 18px 44px rgba(0,0,0,0.5);
  }
  .svc-top{ display:flex; align-items:center; margin-bottom:16px; }
  .svc-pill{
    font-family:'Montserrat'; font-weight:700; font-size:11px;
    letter-spacing:0.15em; text-transform:uppercase;
    padding:8px 16px; border-radius:999px; line-height:1;
  }
  .svc-card.light .svc-pill{ border:1px solid rgba(0,0,0,0.16); color:#2b2b2b; }
  .svc-card.dark .svc-pill{ background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14); color:#ededed; }
  .svc-title{
    font-family:'Montserrat'; font-weight:800; font-size:19px;
    line-height:1.12; letter-spacing:-0.02em;
  }
  .svc-card.light > .svc-title{ margin-bottom:16px; }
  .svc-media{
    position:relative; border-radius:14px; overflow:hidden;
    flex:1 1 auto; margin-bottom:16px;
  }
  .svc-card.light .svc-media{ min-height:106px; }
  .svc-card.dark .svc-media{ min-height:144px; }
  .svc-slot{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .svc-title-on{
    position:absolute; left:16px; right:16px; bottom:14px; z-index:2;
    color:#fff; text-shadow:0 2px 16px rgba(0,0,0,0.7);
  }
  .svc-media::after{
    content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
  }
  .svc-card.dark .svc-media::after{
    background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.65) 100%);
  }
  .svc-foot{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:14px; margin-top:auto;
  }
  .svc-text{
    font-size:12.5px; line-height:1.45; text-wrap:pretty; max-width:84%;
  }
  .svc-card.light .svc-text{ color:#534b40; }
  .svc-card.dark .svc-text{ color:rgba(255,255,255,0.72); }
  .svc-arrow{
    flex:0 0 auto; width:48px; height:48px; border-radius:999px;
    display:grid; place-items:center; cursor:pointer; background:transparent;
    transition:transform .2s ease, background .2s ease;
  }
  .svc-card.light .svc-arrow{ border:1px solid rgba(0,0,0,0.16); color:var(--accent); }
  .svc-card.dark .svc-arrow{ background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.14); color:#fff; }
  .svc-arrow:hover{ transform:scale(1.08); }
  .svc-card.dark .svc-arrow:hover{ background:rgba(255,255,255,0.18); }

  @media (max-width:900px){
    .real-grid{ grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width:600px){
    .real-grid{ grid-template-columns:1fr; max-width:380px; }
    .svc-card{ min-height:0; padding:16px 18px 16px; }
    .svc-card.dark .svc-media{ min-height:160px; }
    .svc-card.light .svc-media{ min-height:120px; }
  }

  /* ============ SEÇÃO 3 — PROBLEMAS ============ */
  .problemas{
    position:relative;
    background:#e2d9c3;
    --brown:#554237;
    --navy:#07192b;
    border-top:1px solid var(--line);
    padding:clamp(80px,11vh,140px) clamp(20px,3.5vw,56px);
  }
  .prob-inner{ max-width:1200px; margin:0 auto; }
  .prob-head .eyebrow{ color:var(--brown); }
  .prob-head{ max-width:680px; margin:0 0 clamp(44px,5.5vh,64px); }
  .prob-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(30px,4vw,52px); line-height:1.05; letter-spacing:-0.02em;
    color:var(--navy); text-wrap:balance;
  }
  .prob-lead{
    margin-top:20px; max-width:560px;
    color:var(--brown); font-size:clamp(15px,1.2vw,17px); line-height:1.65; text-wrap:pretty;
  }
  .prob-grid{
    display:grid; grid-template-columns:repeat(5,1fr); gap:16px;
  }
  .prob-card{
    background:linear-gradient(180deg,#0c2336,#07192b);
    border:1px solid rgba(226,217,195,0.14);
    border-radius:16px;
    padding:24px 22px 26px;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  .prob-card:hover{
    transform:translateY(-4px);
    border-color:rgba(226,217,195,0.5);
    background:linear-gradient(180deg,#103051,#0a2237);
  }
  .prob-ic{ display:inline-flex; margin-bottom:16px; }
  .prob-card-title{
    font-family:'Montserrat'; font-weight:700; font-size:16.5px;
    letter-spacing:-0.01em; color:#fff; margin-bottom:8px;
  }
  .prob-card-text{ color:rgba(255,255,255,0.74); font-size:13.5px; line-height:1.5; text-wrap:pretty; }

  @media (max-width:1080px){ .prob-grid{ grid-template-columns:repeat(4,1fr); } }
  @media (max-width:840px){ .prob-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width:560px){ .prob-grid{ grid-template-columns:repeat(2,1fr); } }

  /* ============ SEÇÃO 4 — SOBRE / ANDRÉ VIDAL ============ */
  .sobre{
    position:relative;
    background:linear-gradient(180deg, var(--bg-0) 0%, #051321 100%);
    border-top:1px solid var(--line);
    padding:clamp(84px,12vh,150px) clamp(20px,3.5vw,56px);
    overflow:hidden;
  }
  .sobre::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(820px 520px at 16% 24%, rgba(226,217,195,0.12), transparent 62%);
  }
  .sobre-inner{
    position:relative; z-index:1; max-width:1180px; margin:0 auto;
    display:grid; grid-template-columns:0.86fr 1.14fr;
    gap:clamp(44px,5.5vw,96px); align-items:center;
  }

  /* --- composição de fotos --- */
  .sobre-media{ position:relative; width:100%; aspect-ratio:5/6; }
  .sobre-slot{ display:block; width:100%; height:100%; object-fit:cover; }
  .sobre-portrait{
    position:absolute; top:0; right:0; width:76%; height:86%;
    border-radius:22px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 44px 90px -42px rgba(0,0,0,0.85);
  }
  .sobre-portrait::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, transparent 58%, rgba(13,13,13,0.45));
  }
  .sobre-ambiente{
    position:absolute; left:0; bottom:0; width:50%; aspect-ratio:1.05;
    border-radius:16px; overflow:hidden;
    border:5px solid #051321;
    box-shadow:0 34px 66px -34px rgba(0,0,0,0.9);
  }
  .sobre-credential{
    position:absolute; left:3%; top:11%; z-index:3;
    display:flex; align-items:center; gap:12px;
    padding:12px 18px 12px 14px; border-radius:14px;
    background:rgba(20,20,20,0.78); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 24px 50px -26px rgba(0,0,0,0.8);
  }
  .sobre-cred-mark{ width:12px; height:12px; border-radius:3px; transform:rotate(45deg); }
  .sobre-cred-text{ display:flex; flex-direction:column; line-height:1.25; }
  .sobre-cred-text strong{ font-family:'Montserrat'; font-weight:800; font-size:15px; color:var(--ink); letter-spacing:-0.01em; }
  .sobre-cred-text span{ font-size:11.5px; letter-spacing:0.06em; color:var(--ink-dim); margin-top:2px; }

  /* --- narrativa --- */
  .sobre-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(30px,4vw,50px); line-height:1.06; letter-spacing:-0.02em;
    color:var(--ink); text-wrap:balance;
  }
  .sobre-lead p{
    margin-top:22px; max-width:560px;
    color:var(--ink-soft); font-size:clamp(15px,1.2vw,17px); line-height:1.72; text-wrap:pretty;
  }
  .sobre-quote{
    margin-top:34px; padding:4px 0 4px 24px;
    border-left:2px solid var(--accent);
  }
  .sobre-quote-text{
    font-family:'DM Serif Display', Georgia, serif; font-style:italic;
    font-size:clamp(20px,2.1vw,27px); line-height:1.32; color:var(--ink);
    max-width:540px; text-wrap:pretty;
  }
  .sobre-quote-by{
    margin-top:14px; font-size:12.5px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-dim);
  }
  .sobre-pillars{
    margin-top:40px; padding-top:34px; border-top:1px solid var(--line);
    display:grid; grid-template-columns:repeat(2,1fr); gap:26px 30px;
  }
  .sobre-pillar{ display:flex; gap:15px; }
  .sobre-pillar-ic{
    flex-shrink:0; width:44px; height:44px; border-radius:12px;
    display:grid; place-items:center;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
  }
  .sobre-pillar-title{
    font-family:'Montserrat'; font-weight:700; font-size:16px;
    letter-spacing:-0.01em; color:var(--ink); margin-bottom:6px;
  }
  .sobre-pillar-text{ color:var(--ink-soft); font-size:13.5px; line-height:1.55; text-wrap:pretty; }

  @media (max-width:900px){
    .sobre-inner{ grid-template-columns:1fr; gap:56px; }
    .sobre-media{ aspect-ratio:auto; max-width:520px; margin:0 auto; }
    .sobre-portrait{ position:relative; width:100%; height:auto; aspect-ratio:4/5; }
    .sobre-ambiente{ position:absolute; left:-10px; bottom:-30px; width:46%; }
    .sobre-credential{ left:auto; right:-6px; top:18px; }
  }
  @media (max-width:520px){
    .sobre-pillars{ grid-template-columns:1fr; gap:22px; }
    .sobre-ambiente{ display:none; }
  }

  /* ============ SEÇÃO 5 — COMO FUNCIONA O ATENDIMENTO ============ */
  .como{
    position:relative;
    background:#e2d9c3;
    --brown:#554237;
    --navy:#07192b;
    border-top:1px solid var(--line);
    padding:clamp(80px,11vh,140px) clamp(20px,3.5vw,56px);
  }
  .como-inner{ max-width:1140px; margin:0 auto; }
  .como-head{ max-width:660px; margin:0 auto clamp(54px,7vh,82px); text-align:center; }
  .como-head .eyebrow{ justify-content:center; color:var(--brown); }
  .como-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(30px,4vw,52px); line-height:1.05; letter-spacing:-0.02em;
    color:var(--navy); text-wrap:balance;
  }
  .como-lead{
    margin:22px auto 0; max-width:580px;
    color:var(--brown); font-size:clamp(15px,1.2vw,17px); line-height:1.7; text-wrap:pretty;
  }

  .como-steps{
    position:relative;
    display:grid; grid-template-columns:repeat(4,1fr); gap:30px;
  }
  .como-steps::before{
    content:""; position:absolute; top:39px; left:11%; right:11%; height:2px; z-index:0;
    background:linear-gradient(90deg, transparent, rgba(85,66,55,0.4) 14%, rgba(85,66,55,0.4) 86%, transparent);
  }
  .como-step{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .como-node{
    position:relative; width:78px; height:78px; border-radius:50%;
    display:grid; place-items:center; margin-bottom:26px;
    background:radial-gradient(120% 120% at 50% 0%, #0c2336, var(--navy) 70%);
    border:1px solid rgba(7,25,43,0.25);
    box-shadow:0 18px 44px -22px rgba(85,66,55,0.5);
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .como-step:hover .como-node{
    transform:translateY(-4px);
    border-color:rgba(7,25,43,0.5);
    box-shadow:0 24px 54px -22px rgba(85,66,55,0.55);
  }
  .como-num{
    position:absolute; top:-7px; right:-7px;
    min-width:27px; height:27px; padding:0 7px; border-radius:999px;
    display:grid; place-items:center;
    font-family:'Montserrat'; font-weight:800; font-size:12.5px; line-height:1;
    color:#e2d9c3; background:var(--brown);
    border:3px solid #e2d9c3;
  }
  .como-step-title{
    font-family:'Montserrat'; font-weight:700; font-size:18px;
    letter-spacing:-0.01em; color:var(--navy); margin-bottom:11px; text-wrap:balance;
  }
  .como-step-text{
    color:var(--brown); font-size:14px; line-height:1.6; max-width:230px; text-wrap:pretty;
  }

  @media (max-width:860px){
    .como-steps{ grid-template-columns:repeat(2,1fr); gap:44px 30px; }
    .como-steps::before{ display:none; }
  }
  @media (max-width:480px){
    .como-steps{ grid-template-columns:1fr; gap:38px; }
  }

  /* ============ SEÇÃO 6 — VÍDEO INSTITUCIONAL ============ */
  .video{
    position:relative;
    background:linear-gradient(180deg, var(--bg-0) 0%, #051321 20%, #051321 100%);
    border-top:1px solid var(--line);
    padding:clamp(82px,11vh,144px) clamp(20px,3.5vw,56px);
    overflow:hidden;
  }
  .video::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(1000px 620px at 50% 18%, rgba(226,217,195,0.10), transparent 60%);
  }
  .video-inner{ position:relative; z-index:1; max-width:1120px; margin:0 auto; }
  .video-head{ text-align:center; max-width:700px; margin:0 auto clamp(40px,5vh,60px); }
  .video-head .eyebrow{ justify-content:center; }
  .video-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(30px,4vw,52px); line-height:1.05; letter-spacing:-0.02em;
    color:var(--ink); text-wrap:balance;
  }
  .video-lead{
    margin:22px auto 0; max-width:600px;
    color:var(--ink-soft); font-size:clamp(15px,1.2vw,17px); line-height:1.7; text-wrap:pretty;
  }

  /* --- palco do player --- */
  .video-stage{
    position:relative; width:100%; max-width:420px; margin:0 auto; aspect-ratio:9/16;
    border-radius:24px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.09);
    box-shadow:0 60px 130px -50px rgba(0,0,0,0.95), 0 0 0 1px rgba(226,217,195,0.10);
  }
  .video-poster{ display:block; width:100%; height:100%; }
  .video-el{ display:block; width:100%; height:100%; object-fit:cover; background:#000; }
  .video-stage.is-playing::after{ display:none; }
  .video-stage::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:2;
    background:
      linear-gradient(180deg, rgba(7,7,7,0.25) 0%, transparent 26%, rgba(7,7,7,0.30) 64%, rgba(7,7,7,0.86) 100%),
      radial-gradient(130% 90% at 50% 42%, transparent 52%, rgba(0,0,0,0.55));
  }
  .video-badge{
    position:absolute; top:22px; left:22px; z-index:4;
    display:inline-flex; align-items:center; gap:9px;
    padding:8px 14px; border-radius:999px;
    background:rgba(7,7,7,0.55); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.16);
    font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink);
  }
  .video-badge .dot{ width:7px; height:7px; border-radius:50%; }
  .video-play{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5;
    width:94px; height:94px; border-radius:50%; cursor:pointer; padding:0;
    display:grid; place-items:center;
    background:rgba(255,255,255,0.12); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.45);
    transition:transform .25s ease, background .25s ease, border-color .25s ease;
  }
  .video-play:hover{ transform:translate(-50%,-50%) scale(1.06); background:rgba(255,255,255,0.2); }
  .video-play svg{ margin-left:5px; }
  .video-ring{
    position:absolute; inset:0; border-radius:50%;
    border:1px solid rgba(255,255,255,0.5); pointer-events:none;
  }
  @media (prefers-reduced-motion: no-preference){
    .video-ring{ animation:videoPulse 2.8s ease-out infinite; }
  }
  @keyframes videoPulse{
    0%{ transform:scale(1); opacity:0.55; }
    100%{ transform:scale(1.9); opacity:0; }
  }
  .video-caption{
    position:absolute; left:28px; bottom:24px; z-index:4; text-align:left;
  }
  .video-caption strong{
    display:block; font-family:'Montserrat'; font-weight:700;
    font-size:clamp(18px,1.8vw,23px); letter-spacing:-0.01em; color:#fff;
  }
  .video-caption span{
    display:block; margin-top:5px;
    font-size:13px; color:rgba(245,243,239,0.72); letter-spacing:0.01em;
  }

  /* --- faixa de cenas (direção cinematográfica) --- */
  .video-scenes{
    margin-top:18px;
    display:grid; grid-template-columns:repeat(5,1fr); gap:14px;
  }
  .video-scene{
    position:relative; aspect-ratio:16/10; border-radius:13px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.07);
    transition:border-color .25s ease, transform .25s ease;
  }
  .video-scene:hover{ transform:translateY(-3px); border-color:rgba(226,217,195,0.55); }
  .video-scene image-slot{ display:block; width:100%; height:100%; }
  .video-scene::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, transparent 40%, rgba(7,7,7,0.82));
  }
  .video-scene-label{
    position:absolute; left:11px; bottom:9px; z-index:2;
    font-family:ui-monospace,'SF Mono',Menlo,monospace;
    font-size:11px; letter-spacing:0.04em; color:rgba(245,243,239,0.92);
  }
  .video-scene-num{
    position:absolute; top:9px; right:11px; z-index:2;
    font-family:ui-monospace,'SF Mono',Menlo,monospace;
    font-size:10px; letter-spacing:0.06em; color:rgba(245,243,239,0.55);
  }
  .video-note{
    margin:26px auto 0; max-width:620px; text-align:center;
    color:var(--ink-dim); font-size:13.5px; line-height:1.6; text-wrap:pretty;
  }

  @media (max-width:760px){
    .video-scenes{ grid-template-columns:repeat(3,1fr); }
    .video-scene:nth-child(n+4){ display:none; }
    .video-play{ width:78px; height:78px; }
    .video-caption{ left:18px; bottom:16px; }
  }
  @media (max-width:460px){
    .video-scenes{ grid-template-columns:repeat(2,1fr); }
    .video-scene:nth-child(n+3){ display:none; }
  }

  /* ============ SEÇÃO 7 — CTA FINAL ============ */
  .cta{
    position:relative;
    background:#e2d9c3;
    --brown:#554237;
    --navy:#07192b;
    --ivory:#e2d9c3;
    border-top:1px solid var(--line);
    padding:clamp(100px,15vh,180px) clamp(20px,3.5vw,56px);
    overflow:hidden;
  }
  .cta::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(900px 520px at 50% 6%, rgba(85,66,55,0.10), transparent 60%),
      radial-gradient(700px 460px at 50% 110%, rgba(7,25,43,0.08), transparent 64%);
  }
  .cta-inner{
    position:relative; z-index:1; max-width:880px; margin:0 auto; text-align:center;
  }
  .cta-inner .eyebrow{ justify-content:center; color:var(--brown); }
  .cta-title{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(34px,5vw,62px); line-height:1.04; letter-spacing:-0.025em;
    color:var(--navy); text-wrap:balance;
  }
  .cta-sub{
    margin:26px auto 0; max-width:620px;
    color:var(--brown); font-size:clamp(16px,1.3vw,19px); line-height:1.6; text-wrap:pretty;
  }
  .cta-actions{
    margin-top:46px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
  }
  .cta-btn{
    display:inline-flex; align-items:center; gap:12px;
    font-family:'Montserrat'; font-weight:700; font-size:16px;
    border-radius:999px; cursor:pointer; border:none; text-decoration:none;
    transition:transform .2s ease, background .2s ease, border-color .2s ease;
  }
  .cta-btn-primary{
    background:var(--brown); color:#e2d9c3; padding:14px 16px 14px 30px;
    box-shadow:0 20px 48px -18px rgba(85,66,55,0.55);
  }
  .cta-btn-primary .ic{
    width:38px; height:38px; border-radius:50%; display:grid; place-items:center;
    background:#e2d9c3; color:var(--brown);
  }
  .cta-btn-primary:hover{ transform:translateY(-2px); }
  .cta-btn-wa{
    background:rgba(7,25,43,0.06); border:1px solid rgba(85,66,55,0.45);
    color:var(--navy); padding:15px 28px;
  }
  .cta-btn-wa .ic{ display:inline-flex; color:var(--brown); }
  .cta-btn-wa:hover{ background:rgba(7,25,43,0.12); transform:translateY(-2px); border-color:rgba(85,66,55,0.7); }
  .cta-note{
    margin-top:28px; display:inline-flex; align-items:center; gap:9px;
    font-size:13.5px; color:var(--brown); letter-spacing:0.01em;
  }
  .cta-note .dot{ width:6px; height:6px; border-radius:50%; }

  @media (max-width:520px){
    .cta-actions{ flex-direction:column; align-items:stretch; }
    .cta-btn{ justify-content:center; }
  }

  /* ============ SEÇÃO 8 — RODAPÉ ============ */
  .footer{
    background:#554237;
    color:#e2d9c3;
    padding:clamp(58px,8vh,90px) clamp(20px,3.5vw,56px) 0;
  }
  .footer-inner{
    max-width:1180px; margin:0 auto;
    display:grid; grid-template-columns:auto 1fr; gap:clamp(36px,5vw,80px);
    align-items:center;
    padding-bottom:clamp(42px,6vh,62px);
  }
  .footer-logo{ height:86px; width:auto; display:block; opacity:0.97; }
  .footer-info{ max-width:640px; }
  .footer-name{
    font-family:'Montserrat'; font-weight:800;
    font-size:clamp(15px,1.4vw,18px); letter-spacing:0.01em;
    color:#f4f1ea; line-height:1.3; margin-bottom:16px; text-transform:uppercase;
  }
  .footer-line{
    font-size:14.5px; line-height:1.75; color:rgba(226,217,195,0.82);
    margin-bottom:9px; text-wrap:pretty;
  }
  .footer-email{
    display:inline-block; margin-top:12px;
    font-family:'Montserrat'; font-weight:600; font-size:15px;
    color:#f4f1ea; text-decoration:none;
    border-bottom:1px solid rgba(244,241,234,0.4); padding-bottom:2px;
    transition:border-color .2s ease;
  }
  .footer-email:hover{ border-color:#f4f1ea; }
  .footer-bottom{
    max-width:1180px; margin:0 auto;
    border-top:1px solid rgba(226,217,195,0.18);
    padding:22px 0;
    font-size:12.5px; letter-spacing:0.04em; color:rgba(226,217,195,0.6);
  }
  @media (max-width:760px){
    .footer-inner{ grid-template-columns:1fr; gap:30px; align-items:start; }
    .footer-logo{ height:66px; }
  }
  .footer-bottom{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; }
  .footer-policy{
    color:rgba(226,217,195,0.72); text-decoration:none;
    font-size:12.5px; letter-spacing:0.04em;
    border-bottom:1px solid rgba(226,217,195,0.28); padding-bottom:1px;
    transition:color .2s ease, border-color .2s ease;
  }
  .footer-policy:hover{ color:var(--ink); border-color:var(--accent); }

  /* ---------- CONSENT BANNER ---------- */
  .consent-wrap{
    position:fixed; left:0; right:0; bottom:0; z-index:120;
    display:flex; justify-content:center;
    padding:clamp(14px,2.5vw,26px);
    pointer-events:none;
    animation:consent-rise .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes consent-rise{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:none; } }
  .consent-card{
    pointer-events:auto;
    display:flex; align-items:center; gap:20px;
    max-width:880px; width:100%;
    padding:18px 20px;
    background:rgba(9,28,46,0.86);
    border:1px solid rgba(226,217,195,0.18);
    border-radius:18px;
    backdrop-filter:blur(18px);
    box-shadow:0 28px 70px -28px rgba(0,0,0,0.9);
  }
  .consent-icon{
    flex:none; width:42px; height:42px; border-radius:12px;
    display:grid; place-items:center; color:var(--accent);
    background:rgba(226,217,195,0.1); border:1px solid rgba(226,217,195,0.2);
  }
  .consent-icon svg{ width:22px; height:22px; }
  .consent-body{ flex:1; min-width:0; }
  .consent-title{
    font-family:'Montserrat'; font-weight:700; font-size:13px;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--ink); margin-bottom:5px;
  }
  .consent-text{ font-size:13.5px; line-height:1.55; color:var(--ink-soft); text-wrap:pretty; }
  .consent-actions{ flex:none; display:flex; align-items:center; gap:10px; }
  .consent-btn{
    cursor:pointer; white-space:nowrap; text-decoration:none;
    font-family:'Montserrat'; font-weight:600; font-size:13.5px;
    padding:11px 18px; border-radius:999px; transition:.2s ease; border:1px solid transparent;
  }
  .consent-btn.ghost{
    color:var(--ink-soft); background:transparent; border-color:rgba(255,255,255,0.16);
  }
  .consent-btn.ghost:hover{ color:var(--ink); border-color:rgba(226,217,195,0.45); }
  .consent-btn.solid{
    color:var(--on-accent); background:var(--accent); border-color:var(--accent);
  }
  .consent-btn.solid:hover{ background:var(--accent-deep); border-color:var(--accent-deep); }
  @media (max-width:680px){
    .consent-card{ flex-direction:column; align-items:flex-start; gap:14px; padding:18px; }
    .consent-actions{ width:100%; }
    .consent-btn{ flex:1; text-align:center; }
    .consent-icon{ display:none; }
  }
</style>
</head>

<script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

</script>
